<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="mm-auth-boot.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>Log In | Musical Metrics</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg?v=2">
  <link rel="icon" type="image/png" href="assets/images/logo.png?v=2">
  <link rel="apple-touch-icon" href="assets/images/logo.png?v=2">
  <link rel="stylesheet" href="globals.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: min(520px, 100%);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(12, 14, 26, 0.85);
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .login-heading {
      margin: 0 0 6px;
      font-size: 28px;
      color: #fff;
      text-align: center;
    }
    .login-subtitle {
      margin: 0 0 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
    }
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }
    .auth-tab {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .auth-tab.active {
      background: rgba(92, 120, 255, 0.22);
      border-color: rgba(120, 145, 255, 0.56);
    }
    .auth-panel {
      display: none;
    }
    .auth-panel.active {
      display: block;
    }
    .auth-label {
      display: block;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      margin-bottom: 6px;
      margin-top: 10px;
    }
    .auth-input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(5, 6, 12, 0.95);
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
    }
    .auth-submit {
      width: 100%;
      margin-top: 16px;
      border: 1px solid rgba(120, 145, 255, 0.45);
      background: rgba(92, 120, 255, 0.24);
      color: #fff;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
    }
    .auth-field-msg {
      margin: 6px 0 0;
      min-height: 0;
      font-size: 12px;
      line-height: 1.35;
      color: #f87171;
      display: none;
    }
    .auth-field-msg:not(:empty) {
      display: block;
    }
    .auth-input.auth-input--error {
      border-color: rgba(248, 113, 113, 0.85);
      box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.25);
    }
    .auth-form-summary {
      display: none;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.45;
      color: #f87171;
    }
    .auth-form-summary.is-visible {
      display: block;
    }
    .auth-form-summary.auth-form-summary--success {
      color: #86efac;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <div class="header-content">
        <div class="logo-container">
          <a href="/" class="logo-link">
            <img src="assets/images/music-logo-white.svg" alt="Musical Metrics Logo" class="nav-logo">
            <span class="logo">MUSICAL METRICS</span>
          </a>
        </div>
        <nav class="nav">
          <a href="/dashboard" class="nav-link">DASHBOARD</a>
          <a href="/leaderboard" class="nav-link">LEADERBOARD</a>
          <a href="/about" class="nav-link">ABOUT</a>
        </nav>
        <button class="mobile-menu-toggle" id="mobile-menu-toggle">
          <i data-lucide="menu" class="hamburger-icon"></i>
        </button>
        <div class="mobile-menu" id="mobile-menu">
          <div class="mobile-menu-links">
            <a href="/dashboard" class="mobile-menu-link">DASHBOARD</a>
            <a href="/leaderboard" class="mobile-menu-link">LEADERBOARD</a>
            <a href="/about" class="mobile-menu-link">ABOUT</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="login-main">
    <section class="login-card">
      <h1 class="login-heading">Account</h1>
      <p class="login-subtitle">Sign in to save scores and track progress.</p>

      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" type="button">Log in</button>
        <button id="tab-signup" class="auth-tab" type="button">Sign up</button>
      </div>

      <form id="panel-login" class="auth-panel active">
        <label class="auth-label" for="login-email">Email</label>
        <input class="auth-input" id="login-email" type="email" autocomplete="email" required aria-invalid="false">
        <p class="auth-field-msg" id="login-email-error" role="alert"></p>

        <label class="auth-label" for="login-password">Password</label>
        <input class="auth-input" id="login-password" type="password" autocomplete="current-password" required aria-invalid="false">
        <p class="auth-field-msg" id="login-password-error" role="alert"></p>

        <label class="remember-row" for="remember-me-checkbox">
          <input id="remember-me-checkbox" type="checkbox" checked>
          <span>Remember me</span>
        </label>

        <div id="login-form-summary" class="auth-form-summary" aria-live="polite"></div>
        <button class="auth-submit" type="submit">Log in</button>
      </form>

      <form id="panel-signup" class="auth-panel">
        <label class="auth-label" for="signup-email">Email</label>
        <input class="auth-input" id="signup-email" type="email" autocomplete="email" required aria-invalid="false">
        <p class="auth-field-msg" id="signup-email-error" role="alert"></p>

        <label class="auth-label" for="signup-username">Username</label>
        <input class="auth-input" id="signup-username" type="text" autocomplete="username" required aria-invalid="false">
        <p class="auth-field-msg" id="signup-username-error" role="alert"></p>

        <label class="auth-label" for="signup-password">Password</label>
        <input class="auth-input" id="signup-password" type="password" autocomplete="new-password" required aria-invalid="false">
        <p class="auth-field-msg" id="signup-password-error" role="alert"></p>

        <label class="auth-label" for="signup-password-confirm">Confirm Password</label>
        <input class="auth-input" id="signup-password-confirm" type="password" autocomplete="new-password" required aria-invalid="false">
        <p class="auth-field-msg" id="signup-password-confirm-error" role="alert"></p>

        <div id="signup-form-summary" class="auth-form-summary" aria-live="polite"></div>
        <button class="auth-submit" type="submit">Create account</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-content">
        <div class="footer-logo">
          <img src="assets/images/music-logo-white.svg" alt="Musical Metrics Logo" class="footer-logo-img">
          <span class="footer-brand">Musical Metrics</span>
        </div>
        <div class="footer-info">
          <div class="footer-links">
            <a href="https://amtf.gr" target="_blank" rel="noopener noreferrer" class="footer-link">
              <img src="assets/images/amtf.png" alt="Athens Music Technology Forum" class="amtf-logo">
              <span class="amtf-text">Athens Music Technology Forum</span>
            </a>
          </div>
          <p class="footer-copyright">© 2025 Musical Metrics. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>

  <script defer src="supabase-auth.js"></script>
  <script>
    lucide.createIcons();

    document.addEventListener("DOMContentLoaded", function () {
      const mobileMenuToggle = document.getElementById("mobile-menu-toggle");
      const mobileMenu = document.getElementById("mobile-menu");
      if (mobileMenuToggle && mobileMenu) {
        mobileMenuToggle.addEventListener("click", function () {
          mobileMenu.classList.toggle("active");
          mobileMenuToggle.classList.toggle("active");
        });
      }

      const tabLogin = document.getElementById("tab-login");
      const tabSignup = document.getElementById("tab-signup");
      const panelLogin = document.getElementById("panel-login");
      const panelSignup = document.getElementById("panel-signup");
      const rememberMeCheckbox = document.getElementById("remember-me-checkbox");

      const LOGIN_FIELDS = {
        email: { input: "login-email", msg: "login-email-error" },
        password: { input: "login-password", msg: "login-password-error" }
      };

      const SIGNUP_FIELDS = {
        email: { input: "signup-email", msg: "signup-email-error" },
        username: { input: "signup-username", msg: "signup-username-error" },
        password: { input: "signup-password", msg: "signup-password-error" },
        confirmPassword: { input: "signup-password-confirm", msg: "signup-password-confirm-error" }
      };

      function clearLoginFormErrors() {
        Object.values(LOGIN_FIELDS).forEach(({ input, msg }) => {
          const inp = document.getElementById(input);
          const m = document.getElementById(msg);
          if (inp) {
            inp.classList.remove("auth-input--error");
            inp.setAttribute("aria-invalid", "false");
          }
          if (m) m.textContent = "";
        });
        const summary = document.getElementById("login-form-summary");
        if (summary) {
          summary.textContent = "";
          summary.classList.remove("is-visible", "auth-form-summary--success");
        }
      }

      function clearSignupFormErrors() {
        Object.values(SIGNUP_FIELDS).forEach(({ input, msg }) => {
          const inp = document.getElementById(input);
          const m = document.getElementById(msg);
          if (inp) {
            inp.classList.remove("auth-input--error");
            inp.setAttribute("aria-invalid", "false");
          }
          if (m) m.textContent = "";
        });
        const summary = document.getElementById("signup-form-summary");
        if (summary) {
          summary.textContent = "";
          summary.classList.remove("is-visible", "auth-form-summary--success");
        }
      }

      function applyLoginErrors(fieldErrors, summaryText) {
        const summary = document.getElementById("login-form-summary");
        if (summary) {
          summary.textContent = summaryText || "";
          summary.classList.toggle("is-visible", Boolean(summaryText && summaryText.trim()));
          summary.classList.remove("auth-form-summary--success");
        }
        for (const key of Object.keys(LOGIN_FIELDS)) {
          const { input, msg } = LOGIN_FIELDS[key];
          const inp = document.getElementById(input);
          const msgEl = document.getElementById(msg);
          if (!inp || !msgEl) continue;
          if (!fieldErrors || !Object.prototype.hasOwnProperty.call(fieldErrors, key)) {
            inp.classList.remove("auth-input--error");
            inp.setAttribute("aria-invalid", "false");
            msgEl.textContent = "";
            continue;
          }
          const text = fieldErrors[key];
          inp.classList.add("auth-input--error");
          inp.setAttribute("aria-invalid", "true");
          msgEl.textContent = typeof text === "string" ? text.trim() : "";
        }
      }

      function applySignupErrors(fieldErrors, summaryText) {
        const summary = document.getElementById("signup-form-summary");
        if (summary) {
          summary.textContent = summaryText || "";
          summary.classList.toggle("is-visible", Boolean(summaryText && summaryText.trim()));
          summary.classList.remove("auth-form-summary--success");
        }
        for (const key of Object.keys(SIGNUP_FIELDS)) {
          const { input, msg } = SIGNUP_FIELDS[key];
          const inp = document.getElementById(input);
          const msgEl = document.getElementById(msg);
          if (!inp || !msgEl) continue;
          if (!fieldErrors || !Object.prototype.hasOwnProperty.call(fieldErrors, key)) {
            inp.classList.remove("auth-input--error");
            inp.setAttribute("aria-invalid", "false");
            msgEl.textContent = "";
            continue;
          }
          const text = fieldErrors[key];
          inp.classList.add("auth-input--error");
          inp.setAttribute("aria-invalid", "true");
          msgEl.textContent = typeof text === "string" ? text.trim() : "";
        }
      }

      function attachClearOnInput(fieldMap, summaryId) {
        Object.values(fieldMap).forEach(({ input, msg }) => {
          const el = document.getElementById(input);
          if (!el) return;
          el.addEventListener("input", () => {
            el.classList.remove("auth-input--error");
            el.setAttribute("aria-invalid", "false");
            const m = document.getElementById(msg);
            if (m) m.textContent = "";
            const summary = document.getElementById(summaryId);
            if (summary) {
              summary.textContent = "";
              summary.classList.remove("is-visible", "auth-form-summary--success");
            }
          });
        });
      }

      attachClearOnInput(LOGIN_FIELDS, "login-form-summary");
      attachClearOnInput(SIGNUP_FIELDS, "signup-form-summary");

      if (window.MMAuth && rememberMeCheckbox) {
        rememberMeCheckbox.checked = window.MMAuth.isRememberMeEnabled();
      }

      const setTab = (mode) => {
        const isLogin = mode === "login";
        tabLogin.classList.toggle("active", isLogin);
        tabSignup.classList.toggle("active", !isLogin);
        panelLogin.classList.toggle("active", isLogin);
        panelSignup.classList.toggle("active", !isLogin);
        if (isLogin) clearSignupFormErrors();
        else clearLoginFormErrors();
      };

      tabLogin.addEventListener("click", () => setTab("login"));
      tabSignup.addEventListener("click", () => setTab("signup"));

      panelLogin.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!window.MMAuth) return;
        clearLoginFormErrors();
        if (rememberMeCheckbox) {
          window.MMAuth.setRememberMe(rememberMeCheckbox.checked);
        }
        const result = await window.MMAuth.loginWithPassword(
          (document.getElementById("login-email").value || "").trim(),
          document.getElementById("login-password").value || ""
        );
        if (result.ok) {
          window.location.href = "/dashboard";
          return;
        }
        applyLoginErrors(result.fieldErrors || {}, result.error || "");
      });

      panelSignup.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!window.MMAuth) return;
        clearSignupFormErrors();
        const result = await window.MMAuth.signUpWithUsername(
          (document.getElementById("signup-email").value || "").trim(),
          (document.getElementById("signup-username").value || "").trim(),
          document.getElementById("signup-password").value || "",
          document.getElementById("signup-password-confirm").value || ""
        );
        if (result.ok) {
          const signupEmail = (document.getElementById("signup-email").value || "").trim();
          window.location.href =
            "/verify-email?email=" + encodeURIComponent(signupEmail);
          return;
        }
        const fe = result.fieldErrors || {};
        let summaryText = result.error || "";
        const fieldMsgs = Object.values(fe).filter((v) => v && String(v).trim());
        if (
          fieldMsgs.length === 1 &&
          fieldMsgs[0].trim() === summaryText.trim()
        ) {
          summaryText = "";
        }
        applySignupErrors(fe, summaryText);
      });
    });
  </script>
</body>
</html>
