<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>Log In | Musical Metrics</title>
  <link rel="icon" type="image/svg+xml" href="music-logo.svg?v=1">
  <link rel="stylesheet" href="globals.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: min(520px, 100%);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(12, 14, 26, 0.85);
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .login-heading {
      margin: 0 0 6px;
      font-size: 28px;
      color: #fff;
      text-align: center;
    }
    .login-subtitle {
      margin: 0 0 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
    }
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }
    .auth-tab {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .auth-tab.active {
      background: rgba(92, 120, 255, 0.22);
      border-color: rgba(120, 145, 255, 0.56);
    }
    .auth-panel {
      display: none;
    }
    .auth-panel.active {
      display: block;
    }
    .auth-label {
      display: block;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      margin-bottom: 6px;
      margin-top: 10px;
    }
    .auth-input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(5, 6, 12, 0.95);
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
    }
    .auth-submit {
      width: 100%;
      margin-top: 16px;
      border: 1px solid rgba(120, 145, 255, 0.45);
      background: rgba(92, 120, 255, 0.24);
      color: #fff;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
    }
    .inline-status {
      display: none;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid rgba(110, 151, 255, 0.45);
      background: rgba(74, 121, 255, 0.15);
      color: #fff;
      padding: 9px 10px;
      font-size: 13px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <div class="header-content">
        <div class="logo-container">
          <a href="/" class="logo-link">
            <img src="music-logo-white.svg" alt="Musical Metrics Logo" class="nav-logo">
            <span class="logo">MUSICAL METRICS</span>
          </a>
        </div>
        <nav class="nav">
          <a href="/dashboard" class="nav-link">DASHBOARD</a>
          <a href="/about" class="nav-link">ABOUT</a>
        </nav>
        <button class="mobile-menu-toggle" id="mobile-menu-toggle">
          <i data-lucide="menu" class="hamburger-icon"></i>
        </button>
        <div class="mobile-menu" id="mobile-menu">
          <div class="mobile-menu-links">
            <a href="/dashboard" class="mobile-menu-link">DASHBOARD</a>
            <a href="/about" class="mobile-menu-link">ABOUT</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="login-main">
    <section class="login-card">
      <h1 class="login-heading">Account</h1>
      <p class="login-subtitle">Sign in to save scores and track progress.</p>

      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" type="button">Log in</button>
        <button id="tab-signup" class="auth-tab" type="button">Sign up</button>
      </div>

      <form id="panel-login" class="auth-panel active">
        <label class="auth-label" for="login-email">Email</label>
        <input class="auth-input" id="login-email" type="email" autocomplete="email" required>

        <label class="auth-label" for="login-password">Password</label>
        <input class="auth-input" id="login-password" type="password" autocomplete="current-password" required>

        <label class="remember-row" for="remember-me-checkbox">
          <input id="remember-me-checkbox" type="checkbox" checked>
          <span>Remember me</span>
        </label>

        <button class="auth-submit" type="submit">Log in</button>
      </form>
      <div id="mm-inline-status" class="inline-status" aria-live="polite"></div>

      <form id="panel-signup" class="auth-panel">
        <label class="auth-label" for="signup-email">Email</label>
        <input class="auth-input" id="signup-email" type="email" autocomplete="email" required>

        <label class="auth-label" for="signup-username">Username</label>
        <input class="auth-input" id="signup-username" type="text" autocomplete="username" required>

        <label class="auth-label" for="signup-password">Password</label>
        <input class="auth-input" id="signup-password" type="password" autocomplete="new-password" required>

        <label class="auth-label" for="signup-password-confirm">Confirm Password</label>
        <input class="auth-input" id="signup-password-confirm" type="password" autocomplete="new-password" required>

        <button class="auth-submit" type="submit">Create account</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-content">
        <div class="footer-logo">
          <img src="music-logo-white.svg" alt="Musical Metrics Logo" class="footer-logo-img">
          <span class="footer-brand">Musical Metrics</span>
        </div>
        <div class="footer-info">
          <div class="footer-links">
            <a href="https://amtf.gr" target="_blank" rel="noopener noreferrer" class="footer-link">
              <img src="amtf.png" alt="Athens Music Technology Forum" class="amtf-logo">
              <span class="amtf-text">Athens Music Technology Forum</span>
            </a>
          </div>
          <p class="footer-copyright">© 2025 Musical Metrics. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>

  <script defer src="supabase-auth.js"></script>
  <script>
    lucide.createIcons();

    document.addEventListener("DOMContentLoaded", function () {
      const mobileMenuToggle = document.getElementById("mobile-menu-toggle");
      const mobileMenu = document.getElementById("mobile-menu");
      if (mobileMenuToggle && mobileMenu) {
        mobileMenuToggle.addEventListener("click", function () {
          mobileMenu.classList.toggle("active");
          mobileMenuToggle.classList.toggle("active");
        });
      }

      const tabLogin = document.getElementById("tab-login");
      const tabSignup = document.getElementById("tab-signup");
      const panelLogin = document.getElementById("panel-login");
      const panelSignup = document.getElementById("panel-signup");
      const rememberMeCheckbox = document.getElementById("remember-me-checkbox");

      if (window.MMAuth && rememberMeCheckbox) {
        rememberMeCheckbox.checked = window.MMAuth.isRememberMeEnabled();
      }

      const setTab = (mode) => {
        const isLogin = mode === "login";
        tabLogin.classList.toggle("active", isLogin);
        tabSignup.classList.toggle("active", !isLogin);
        panelLogin.classList.toggle("active", isLogin);
        panelSignup.classList.toggle("active", !isLogin);
      };

      tabLogin.addEventListener("click", () => setTab("login"));
      tabSignup.addEventListener("click", () => setTab("signup"));

      panelLogin.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!window.MMAuth) return;
        if (rememberMeCheckbox) {
          window.MMAuth.setRememberMe(rememberMeCheckbox.checked);
        }
        const result = await window.MMAuth.loginWithPassword(
          (document.getElementById("login-email").value || "").trim(),
          document.getElementById("login-password").value || ""
        );
        if (result.ok) {
          window.location.href = "/dashboard";
        }
      });

      panelSignup.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!window.MMAuth) return;
        const result = await window.MMAuth.signUpWithUsername(
          (document.getElementById("signup-email").value || "").trim(),
          (document.getElementById("signup-username").value || "").trim(),
          document.getElementById("signup-password").value || "",
          document.getElementById("signup-password-confirm").value || ""
        );
        if (result.ok) {
          setTab("login");
        } else if (result.error && window.MMAuth.showStatus) {
          window.MMAuth.showStatus(result.error, "error");
        }
      });
    });
  </script>
</body>
</html>
